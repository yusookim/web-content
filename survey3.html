<!DOCTYPE>
<html>
    <head>
        <meta charset="UTF-8">
        <title>설문지</title>
    </head>

    <body>
        <header>
            <h1>설문지</h1>
            <p>소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.</p>
            <hr>
        </header>

        <section>
            <form>
                <br>
                <article id="hagnyeon">
                    학년 
                    <label><input type="radio" name="hagnyeon" value="1" checked>1학년</label>
                    <label><input type="radio" name="hagnyeon" value="2">2학년</label>
                    <label><input type="radio" name="hagnyeon" value="3">3학년</label>
                </article>
                <br>

                <article id="seongbyeol">
                    성별 
                    <label><input type="radio" name="seongbyeol" value="1">남</label>
                    <label><input type="radio" name="seongbyeol" value="2">여</label>
                </article>
                <br>

                <article>
                    관심분야 
                    <select name="gwansim">
                        <option value="1" selected>게임</option>
                        <option value="2">재테크</option>
                        <option value="3">인공지능</option>
                        <option value="4">컴퓨터</option>
                    </select>
                </article>
                <br>

                <article>
                    진로 
                    <label><input type="checkbox" value="1" checked>개발</label>
                    <label><input type="checkbox" value="2">기획</label>
                    <label><input type="checkbox" value="3">영업</label>
                    <label><input type="checkbox" value="4">창업</label>
                </article>
                <br>

                <article>
                    남기고 싶은 말 
                    <textarea cols="30" rows="10">글을 남겨주세요</textarea>
                </article>

                <article>
                    <p>Copyrigght 2026 by MYONGJI COLLEGE</p>
                </article>
            </form>
        </section>
    </body>
</html>
